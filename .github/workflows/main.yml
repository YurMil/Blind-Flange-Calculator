name: Blind Flange Calculator CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: blind-flange-calculator-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '22'
  PNPM_VERSION: '10.33.0'
  APP_DIR: apps/blind-flange-calculator
  STATIC_APP_DIR: static/utility-apps/blind-flange-calculator

jobs:
  quality:
    name: Typecheck, test, and build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck utility app
        run: pnpm typecheck:blind-flange

      - name: Unit tests
        run: pnpm test:blind-flange

      - name: Build utility app
        run: pnpm build:blind-flange

      - name: Install Playwright Chromium
        run: corepack pnpm --dir apps/blind-flange-calculator exec playwright install --with-deps chromium

      - name: Playwright smoke tests
        run: pnpm test:e2e:blind-flange

      - name: Check static asset budgets
        run: pnpm check:bundle-budget

      - name: Validate static artifact
        shell: bash
        run: |
          test -f "${STATIC_APP_DIR}/app.html"
          test -f "${STATIC_APP_DIR}/manifest.json"
          test -d "${STATIC_APP_DIR}/assets"
          node <<'NODE'
          const fs = require('fs');
          const manifestPath = `${process.env.STATIC_APP_DIR}/manifest.json`;
          const manifest = JSON.parse(fs.readFileSync(manifestPath, 'utf8'));

          if (manifest.name !== 'blind-flange-calculator') {
            throw new Error(`Invalid manifest.name: ${manifest.name}`);
          }

          if (manifest.entry !== 'app.html') {
            throw new Error(`Invalid manifest.entry: ${manifest.entry}`);
          }

          if (!Array.isArray(manifest.assets) || manifest.assets.length === 0) {
            throw new Error('Manifest has no assets');
          }
          NODE

      - name: Upload deployable static app
        uses: actions/upload-artifact@v4
        with:
          name: blind-flange-calculator-static
          path: ${{ env.STATIC_APP_DIR }}
          if-no-files-found: error
          retention-days: 14

  deploy:
    name: Deploy to website repository
    runs-on: ubuntu-latest
    needs: quality
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    # Serialize publishes so concurrent main builds do not race each other.
    concurrency:
      group: deploy-blind-flange-calculator-website
      cancel-in-progress: false

    steps:
      - name: Download static app artifact
        uses: actions/download-artifact@v4
        with:
          name: blind-flange-calculator-static
          path: deploy/blind-flange-calculator

      - name: Publish static app to website repository
        env:
          API_TOKEN_GITHUB: ${{ secrets.DEPLOY_TOKEN }}
          DEST_OWNER: Biosxxx
          DEST_REPO: cadautoscript.com
          TARGET_DIR: static/utility-apps/blind-flange-calculator
          TARGET_BRANCH: main
          GIT_USER_NAME: blind-flange-deploy-bot
          GIT_USER_EMAIL: bot@biosxxx.com
          COMMIT_MESSAGE: Deploy blind flange calculator from ${{ github.repository }}@${{ github.sha }}
        shell: bash
        run: |
          set -euo pipefail

          if [ -z "${API_TOKEN_GITHUB:-}" ]; then
            echo "DEPLOY_TOKEN secret is missing" >&2
            exit 1
          fi

          SOURCE_DIR="$GITHUB_WORKSPACE/deploy/blind-flange-calculator"
          WORK_DIR="$RUNNER_TEMP/website-repo"
          DEST_URL="https://x-access-token:${API_TOKEN_GITHUB}@github.com/${DEST_OWNER}/${DEST_REPO}.git"

          test -f "${SOURCE_DIR}/app.html"
          test -f "${SOURCE_DIR}/manifest.json"
          test -d "${SOURCE_DIR}/assets"

          rm -rf "${WORK_DIR}"
          git clone --depth 20 --branch "${TARGET_BRANCH}" "${DEST_URL}" "${WORK_DIR}"
          cd "${WORK_DIR}"

          git config user.name "${GIT_USER_NAME}"
          git config user.email "${GIT_USER_EMAIL}"

          mkdir -p "${TARGET_DIR}"
          # Mirror the built app into the website path (delete stale hashed assets).
          rsync -a --delete \
            --exclude '.git' \
            "${SOURCE_DIR}/" \
            "${TARGET_DIR}/"

          if git diff --quiet && git diff --cached --quiet; then
            echo "No website changes to publish."
            exit 0
          fi

          git add -- "${TARGET_DIR}"
          git commit -m "${COMMIT_MESSAGE}"

          # Other utility deploys may land on the same website main between clone and push.
          max_attempts=5
          attempt=1
          while true; do
            if git push origin "HEAD:${TARGET_BRANCH}"; then
              echo "Published to ${DEST_OWNER}/${DEST_REPO}@${TARGET_BRANCH}:${TARGET_DIR}"
              exit 0
            fi

            if [ "${attempt}" -ge "${max_attempts}" ]; then
              echo "Push failed after ${max_attempts} attempts (non-fast-forward race)." >&2
              exit 1
            fi

            echo "Push rejected; rebasing onto origin/${TARGET_BRANCH} (attempt ${attempt}/${max_attempts})..."
            git fetch origin "${TARGET_BRANCH}"
            git rebase "origin/${TARGET_BRANCH}"
            attempt=$((attempt + 1))
            sleep $((attempt * 2))
          done
