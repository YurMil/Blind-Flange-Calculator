name: Blind Flange Calculator CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: blind-flange-calculator-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '22'
  PNPM_VERSION: '10.33.0'
  APP_DIR: apps/blind-flange-calculator
  STATIC_APP_DIR: static/utility-apps/blind-flange-calculator

jobs:
  quality:
    name: Typecheck, test, and build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck utility app
        run: pnpm typecheck:blind-flange

      - name: Unit tests
        run: pnpm test:blind-flange

      - name: Build utility app
        run: pnpm build:blind-flange

      - name: Validate static artifact
        shell: bash
        run: |
          test -f "${STATIC_APP_DIR}/app.html"
          test -f "${STATIC_APP_DIR}/manifest.json"
          test -d "${STATIC_APP_DIR}/assets"
          node <<'NODE'
          const fs = require('fs');
          const manifestPath = `${process.env.STATIC_APP_DIR}/manifest.json`;
          const manifest = JSON.parse(fs.readFileSync(manifestPath, 'utf8'));

          if (manifest.name !== 'blind-flange-calculator') {
            throw new Error(`Invalid manifest.name: ${manifest.name}`);
          }

          if (manifest.entry !== 'app.html') {
            throw new Error(`Invalid manifest.entry: ${manifest.entry}`);
          }

          if (!Array.isArray(manifest.assets) || manifest.assets.length === 0) {
            throw new Error('Manifest has no assets');
          }
          NODE

      - name: Upload deployable static app
        uses: actions/upload-artifact@v4
        with:
          name: blind-flange-calculator-static
          path: ${{ env.STATIC_APP_DIR }}
          if-no-files-found: error
          retention-days: 14

  deploy:
    name: Deploy to website repository
    runs-on: ubuntu-latest
    needs: quality
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Download static app artifact
        uses: actions/download-artifact@v4
        with:
          name: blind-flange-calculator-static
          path: deploy/blind-flange-calculator

      - name: Publish static app to website repository
        uses: cpina/github-action-push-to-another-repository@main
        env:
          API_TOKEN_GITHUB: ${{ secrets.DEPLOY_TOKEN }}
        with:
          source-directory: deploy/blind-flange-calculator
          destination-github-username: Biosxxx
          destination-repository-name: cadautoscript.com
          target-directory: static/utility-apps/blind-flange-calculator
          target-branch: main
          user-email: bot@biosxxx.com
          user-name: blind-flange-deploy-bot
          commit-message: Deploy blind flange calculator from ${{ github.repository }}@${{ github.sha }}
